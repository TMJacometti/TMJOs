<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TMJOs icon">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#ff2d95"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <rect id="tooth" x="-14" y="-218" width="28" height="42" rx="2" fill="url(#neon)"/>
  </defs>

  <!-- App icon: fundo arredondado dark com gear+T centrais -->
  <rect width="512" height="512" rx="96" fill="#0a0e2a"/>

  <g transform="translate(256 256)" filter="url(#glow)">
    <use href="#tooth"/>
    <use href="#tooth" transform="rotate(30)"/>
    <use href="#tooth" transform="rotate(60)"/>
    <use href="#tooth" transform="rotate(90)"/>
    <use href="#tooth" transform="rotate(120)"/>
    <use href="#tooth" transform="rotate(150)"/>
    <use href="#tooth" transform="rotate(180)"/>
    <use href="#tooth" transform="rotate(210)"/>
    <use href="#tooth" transform="rotate(240)"/>
    <use href="#tooth" transform="rotate(270)"/>
    <use href="#tooth" transform="rotate(300)"/>
    <use href="#tooth" transform="rotate(330)"/>

    <circle r="180" fill="none" stroke="url(#neon)" stroke-width="6"/>
    <circle r="120" fill="none" stroke="url(#neon)" stroke-width="4"/>
    <circle r="116" fill="#0a0e2a"/>

    <rect x="-72" y="-78" width="144" height="26" rx="3" fill="url(#neon)"/>
    <rect x="-14" y="-78" width="28" height="156" rx="3" fill="url(#neon)"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TMJOs logo">
  <defs>
    <!-- Neon gradient: cyan → violet → magenta (puxado do wallpaper) -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#ff2d95"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dente da engrenagem reutilizável -->
    <rect id="tooth" x="-14" y="-218" width="28" height="42" rx="2" fill="url(#neon)"/>
  </defs>

  <!-- Background dark navy -->
  <rect width="512" height="512" fill="#0a0e2a"/>

  <!-- Subtle hex grid (decoração de fundo) -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="1" fill="none">
    <polygon points="60,80 92,62 124,80 124,116 92,134 60,116"/>
    <polygon points="388,80 420,62 452,80 452,116 420,134 388,116"/>
    <polygon points="60,396 92,378 124,396 124,432 92,450 60,432"/>
    <polygon points="388,396 420,378 452,396 452,432 420,450 388,432"/>
  </g>

  <!-- Engrenagem (12 dentes) -->
  <g transform="translate(256 256)" filter="url(#glow)">
    <use href="#tooth"/>
    <use href="#tooth" transform="rotate(30)"/>
    <use href="#tooth" transform="rotate(60)"/>
    <use href="#tooth" transform="rotate(90)"/>
    <use href="#tooth" transform="rotate(120)"/>
    <use href="#tooth" transform="rotate(150)"/>
    <use href="#tooth" transform="rotate(180)"/>
    <use href="#tooth" transform="rotate(210)"/>
    <use href="#tooth" transform="rotate(240)"/>
    <use href="#tooth" transform="rotate(270)"/>
    <use href="#tooth" transform="rotate(300)"/>
    <use href="#tooth" transform="rotate(330)"/>

    <!-- Anel externo -->
    <circle r="180" fill="none" stroke="url(#neon)" stroke-width="4"/>
    <!-- Anel interno -->
    <circle r="120" fill="none" stroke="url(#neon)" stroke-width="3"/>
    <!-- Centro escuro pra letra ressaltar -->
    <circle r="116" fill="#0a0e2a"/>
  </g>

  <!-- Letra T grande no centro (tipografia chunky inspirada no wallpaper) -->
  <g transform="translate(256 256)" filter="url(#glow)">
    <!-- Topo largo do T (chapéu de samurai) -->
    <rect x="-72" y="-78" width="144" height="22" rx="2" fill="url(#neon)"/>
    <!-- Haste vertical do T -->
    <rect x="-12" y="-78" width="24" height="148" rx="2" fill="url(#neon)"/>
  </g>

  <!-- Wordmark TMJOs embaixo -->
  <text x="256" y="448"
        text-anchor="middle"
        font-family="'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace"
        font-size="54"
        font-weight="900"
        letter-spacing="4"
        fill="url(#neon)"
        filter="url(#glow)">TMJOs</text>

  <!-- Tagline -->
  <text x="256" y="488"
        text-anchor="middle"
        font-family="'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace"
        font-size="14"
        letter-spacing="8"
        fill="#00d4ff"
        opacity="0.85">FOR THE INSANE</text>
</svg>

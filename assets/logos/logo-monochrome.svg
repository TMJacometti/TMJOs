<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TMJOs logo monochrome">
  <defs>
    <rect id="tooth" x="-14" y="-218" width="28" height="42" rx="2" fill="currentColor"/>
  </defs>

  <!-- Versão mono: usa currentColor pra herdar do contexto.
       Útil pra impressão, README badges, dark/light theme switch. -->
  <g color="#000" fill="currentColor">
    <g transform="translate(256 256)">
      <use href="#tooth"/>
      <use href="#tooth" transform="rotate(30)"/>
      <use href="#tooth" transform="rotate(60)"/>
      <use href="#tooth" transform="rotate(90)"/>
      <use href="#tooth" transform="rotate(120)"/>
      <use href="#tooth" transform="rotate(150)"/>
      <use href="#tooth" transform="rotate(180)"/>
      <use href="#tooth" transform="rotate(210)"/>
      <use href="#tooth" transform="rotate(240)"/>
      <use href="#tooth" transform="rotate(270)"/>
      <use href="#tooth" transform="rotate(300)"/>
      <use href="#tooth" transform="rotate(330)"/>

      <circle r="180" fill="none" stroke="currentColor" stroke-width="6"/>
      <circle r="120" fill="none" stroke="currentColor" stroke-width="4"/>
      <circle r="116" fill="white"/>

      <rect x="-72" y="-78" width="144" height="26" rx="3"/>
      <rect x="-14" y="-78" width="28" height="156" rx="3"/>
    </g>

    <text x="256" y="448"
          text-anchor="middle"
          font-family="'JetBrains Mono', 'Courier New', monospace"
          font-size="54"
          font-weight="900"
          letter-spacing="4"
          fill="currentColor">TMJOs</text>
  </g>
</svg>

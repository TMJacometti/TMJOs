name: Build & publish .deb packages

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'apps/**'
      - 'packages/sources/**'
      - 'packages/conf/**'
      - 'packages/keys/**'
      - 'tools/**'
      - '.github/workflows/build-deb.yml'
  workflow_dispatch:

# Required for peaceiris/actions-gh-pages to push to gh-pages branch
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential \
              devscripts debhelper dpkg-dev reprepro \
              gnupg lintian fakeroot \
              cargo rustc pkg-config \
              libgtk-4-dev libadwaita-1-dev

      - name: Import GPG signing key
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          if [ -z "$GPG_SIGNING_KEY" ]; then
            echo "::error::GPG_SIGNING_KEY secret is not set."
            echo "::error::Add the TMJOs private key to repo secrets."
            exit 1
          fi
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          gpg --list-secret-keys

      - name: Vendor upstream files (apps/* → packages/sources/*/vendor/)
        run: |
          set -e
          for vs in tools/vendor-*.sh; do
              [ -f "$vs" ] || continue
              echo "::group::Running $vs"
              chmod +x "$vs"
              "$vs"
              echo "::endgroup::"
          done

      - name: Build all packages in packages/sources/
        run: |
          set -e
          mkdir -p packages/dist
          for pkg_dir in packages/sources/*/; do
              pkg_name=$(basename "$pkg_dir")
              echo "::group::Building $pkg_name"
              (
                  cd "$pkg_dir"
                  dpkg-buildpackage -us -uc -b
              )
              mv packages/sources/*.deb        packages/dist/ 2>/dev/null || true
              mv packages/sources/*.changes    packages/dist/ 2>/dev/null || true
              mv packages/sources/*.buildinfo  packages/dist/ 2>/dev/null || true
              echo "::endgroup::"
          done
          ls -lah packages/dist/

      - name: Setup reprepro and build APT repo
        run: |
          set -e
          mkdir -p apt-repo
          cp -r packages/conf apt-repo/
          # Custom domain: GitHub Pages reads this file from gh-pages
          echo 'packages.tmjos.com.br' > apt-repo/CNAME
          # Suite única `stable` — agnóstica de distro. Funciona em
          # qualquer Linux Debian-based (Ubuntu/Debian/Mint/Pop/Kali/etc).
          for deb in packages/dist/*.deb; do
              echo "Adding $deb to reprepro (stable)..."
              reprepro --basedir apt-repo --ignore=wrongdistribution \
                  includedeb stable "$deb"
          done
          # Public key pro repo (user adiciona como signed-by)
          mkdir -p apt-repo/keys
          cp packages/keys/tmjos-archive-keyring.asc apt-repo/keys/
          gpg --dearmor < packages/keys/tmjos-archive-keyring.asc \
              > apt-repo/keys/tmjos-archive-keyring.gpg
          # Landing page
          cat > apt-repo/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="pt-br"><head>
          <meta charset="utf-8">
          <title>TMJOs Suite — APT Repo</title>
          <style>
            body{font-family:'JetBrains Mono',monospace;background:#0a0e2a;
                 color:#e6e6e6;max-width:780px;margin:40px auto;padding:0 20px;
                 line-height:1.6}
            h1{color:#00d4ff;font-size:2em}
            h2{color:#ff2d95;margin-top:2em}
            a{color:#00d4ff}
            a:hover{color:#ff2d95}
            code,pre{background:#1a1e3a;padding:2px 6px;border-radius:3px;
                     color:#e6e6e6}
            pre{padding:14px;overflow-x:auto;border:1px solid #1a1e3a}
            .tag{background:#1a1e3a;color:#00d4ff;padding:2px 8px;
                 border-radius:3px;font-size:0.85em}
          </style></head>
          <body>
          <h1>🐉 TMJOs Suite</h1>
          <p>Apps proprietários TMJOs assinados com GPG.
          Funciona em <strong>qualquer Linux Debian-based</strong> com apt:
          Ubuntu, Debian, Linux Mint, Pop!_OS, Kali, Tails, Parrot,
          elementaryOS, Zorin OS, etc.</p>

          <h2>Setup</h2>
          <pre><code>curl -fsSL https://packages.tmjos.com.br/keys/tmjos-archive-keyring.gpg | sudo tee /usr/share/keyrings/tmjos-archive-keyring.gpg > /dev/null
          echo 'deb [signed-by=/usr/share/keyrings/tmjos-archive-keyring.gpg] https://packages.tmjos.com.br stable main' | sudo tee /etc/apt/sources.list.d/tmjos.list
          sudo apt update</code></pre>

          <h2>Apps disponíveis</h2>
          <pre><code>sudo apt install tmjpad    # Editor de texto Rust com session persistence
          sudo apt install tmjmenu   # Popup launcher + dock (TMJMenu + TMJDock)
          sudo apt install tmjstore  # Software center proprietário</code></pre>

          <p>Ver lista completa: <a href="dists/stable/main/binary-amd64/Packages">Packages</a></p>

          <h2>Source</h2>
          <p>Código em <a href="https://github.com/TMJacometti/TMJOs">github.com/TMJacometti/TMJOs</a></p>
          </body></html>
          HTML
          ls -R apt-repo/dists/ | head -30

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feature/') || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          publish_branch: gh-pages
          enable_jekyll: false
          commit_message: 'apt repo update from ${{ github.sha }}'

      - name: Upload .deb artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: tmjos-debs-${{ github.sha }}
          path: packages/dist/*.deb
          retention-days: 14
          if-no-files-found: warn

name: Build TMJOs ISO

on:
  push:
    branches: [main]
    paths:
      - 'distro/**'
      - 'assets/**'
      - '.github/workflows/build-iso.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap squashfs-tools \
              xorriso grub-efi-amd64-bin grub-pc-bin mtools dosfstools \
              syslinux-utils isolinux syslinux-common

      - name: Ensure debootstrap knows about plucky
        run: |
          # plucky → noble (24.04 LTS script moderno). Era 'gutsy' (7.10/
          # 2007) mas o script antigo referencia keys removidas e gera
          # "Release signed by unknown key 871920D1991BC93C" pra Ubuntu
          # 26.04 archive. noble tem keys atuais.
          sudo ln -sfn noble /usr/share/debootstrap/scripts/plucky

      - name: Patch live-build (remove Ubuntu legacy hardcodes)
        run: |
          chmod +x tools/patch-live-build.sh
          sudo tools/patch-live-build.sh

      - name: Debug live-build options
        run: |
          lb config --help 2>&1 | head -100 || true
          dpkg -l live-build | tail -1

      - name: Build ISO
        run: |
          chmod +x distro/build.sh distro/hooks/*.sh
          sudo distro/build.sh

      - name: Generate checksums
        run: |
          sudo chmod -R a+rw /tmp/tmjos-build
          cd /tmp/tmjos-build
          sha256sum *.iso > SHA256SUMS
          md5sum *.iso > MD5SUMS

      - name: Upload ISO to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          R2_ENDPOINT="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          BUCKET="tmjos-releases"
          PREFIX="tmjos-releases"

          ISO_FILE=$(find /tmp/tmjos-build -maxdepth 1 -name "*.iso" | head -1)
          ISO_NAME=$(basename "$ISO_FILE")

          echo "Uploading $ISO_NAME to R2..."
          aws s3 cp "$ISO_FILE" "s3://${BUCKET}/${PREFIX}/${ISO_NAME}" \
              --endpoint-url "$R2_ENDPOINT" \
              --no-progress

          echo "Uploading checksums..."
          aws s3 cp /tmp/tmjos-build/SHA256SUMS "s3://${BUCKET}/${PREFIX}/SHA256SUMS" \
              --endpoint-url "$R2_ENDPOINT"
          aws s3 cp /tmp/tmjos-build/MD5SUMS "s3://${BUCKET}/${PREFIX}/MD5SUMS" \
              --endpoint-url "$R2_ENDPOINT"

          echo "Upload complete: ${PREFIX}/${ISO_NAME}"
